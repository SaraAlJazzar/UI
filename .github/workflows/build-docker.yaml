name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build -f ./Dockerfile -t local/fastapi-app:${{ github.sha }} .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image (push)
        if: github.event_name == 'push'
        run: |
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}"
          docker build -f ./Dockerfile -t "fastapi-app:latest" -t "fastapi-app:${{ github.sha }}" .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}"
          docker push "fastapi-app:latest"
          docker push "fastapi-app:${{ github.sha }}"
